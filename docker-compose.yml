version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: ent-postgres
    restart: always
    environment:
      POSTGRES_DB: ent_platform
      POSTGRES_USER: ent_user
      POSTGRES_PASSWORD: 123456
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: