spring.application.name=entplatform

spring.datasource.url=jdbc:postgresql://localhost:5432/ent_platform
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT (use env var JWT_SECRET in production)
jwt.secret=${JWT_SECRET:entplatform-dev-secret-key-must-be-at-least-32-chars}
jwt.expiration-ms=3600000

# Auth-only stage: disable infra not used yet
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration,\
  org.springframework.boot.autoconfigure.elasticsearch.ElasticsearchClientAutoConfiguration,\
  org.springframework.boot.autoconfigure.elasticsearch.ElasticsearchRestClientAutoConfiguration,\
  org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration
